<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Dust Reign tactical FPS platform launcher, inventory, trade, and profile hub."
    />
    <meta name="theme-color" content="#080603" />
    <title>Dust Reign Tactical FPS Network</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #080603;
        color: #f7ead3;
      }

      .boot-fallback {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 20%, rgba(242, 184, 75, 0.22), transparent 24rem),
          linear-gradient(135deg, #080603, #16100a 55%, #080603);
      }

      .boot-fallback div {
        max-width: 34rem;
      }

      .boot-fallback strong {
        display: block;
        color: #ffd27a;
        font-size: clamp(3rem, 12vw, 7rem);
        font-family: Georgia, "Times New Roman", serif;
        line-height: 0.85;
        letter-spacing: -0.08em;
        text-transform: uppercase;
      }

      .boot-fallback span {
        display: block;
        margin-top: 1rem;
        color: rgba(247, 234, 211, 0.72);
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .static-rescue {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: grid;
        place-items: center;
        padding: 2rem;
        pointer-events: none;
        color: #f7ead3;
        background:
          radial-gradient(circle at 22% 16%, rgba(242, 184, 75, 0.3), transparent 28rem),
          radial-gradient(circle at 80% 22%, rgba(199, 74, 47, 0.22), transparent 30rem),
          linear-gradient(135deg, #080603 0%, #1a1008 52%, #080603 100%);
      }

      .static-rescue-inner {
        width: min(56rem, 100%);
      }

      .static-rescue strong {
        display: block;
        color: #fff4d7;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(4rem, 14vw, 11rem);
        line-height: 0.78;
        letter-spacing: -0.09em;
        text-transform: uppercase;
        text-shadow: 0 0 30px rgba(242, 184, 75, 0.35);
      }

      .static-rescue p {
        max-width: 42rem;
        margin: 1.25rem 0 0;
        color: rgba(255, 240, 211, 0.82);
        font: 600 1rem/1.7 Inter, system-ui, sans-serif;
      }

      body.react-mounted .static-rescue {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="static-rescue" aria-hidden="true">
      <div class="static-rescue-inner">
        <strong>Dust Reign</strong>
        <p>Tactical FPS platform loading. If this message remains visible, the deployed JavaScript bundle is not being served from the current build.</p>
      </div>
    </div>
    <div id="root">
      <div class="boot-fallback">
        <div>
          <strong>Dust Reign</strong>
          <span>Loading tactical platform...</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
